<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <!-- Disable browser scroll restoration so React controls scroll position -->
  <script>if ('scrollRestoration' in history) { history.scrollRestoration = 'manual'; }</script>

  <!-- SEO & Open Graph Tags for WhatsApp / Social Media -->
  <title>MakerLab Academy — Codage, Robotique et IA pour Enfants</title>
  <meta name="description" content="Ateliers innovants de coding, robotique et IA pour préparer vos enfants au futur du numérique. Apprendre en s&apos;amusant avec MakerLab Academy." />
  <meta property="og:title" content="MakerLab Academy — Codage, Robotique et IA" />
  <meta property="og:description" content="Préparez vos enfants au futur du numérique avec nos ateliers innovants en coding, robotique et IA." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://space.makerlab.academy/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="MakerLab Academy — Codage, Robotique et IA" />
  <meta name="twitter:description" content="Ateliers innovants de coding, robotique et IA pour préparer vos enfants au futur." />

  <!-- Tailwind CSS is now bundled at build time via PostCSS (tailwind.config.js) -->
  <!-- Removed CDN script — it was downloading ~400KB + running JIT on every page load -->

  <!-- Google Fonts — preconnect for faster DNS + TLS handshake -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Fredoka:wght@400;600&display=swap"
    rel="stylesheet">

  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Makerlab">
  <meta name="theme-color" content="#e87722">
  <link rel="apple-touch-icon" href="/logo-icon.png">

  <!-- Inline utilities not generated by Tailwind (hover interactions, text-stroke, perspective) -->
  <style>
    .hover-lift {
      transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
    }
    .hover-lift:hover {
      transform: translate(-4px, -4px);
      box-shadow: 8px 8px 0px 0px rgba(0, 0, 0, 1) !important;
    }
    .text-stroke-3 {
      -webkit-text-stroke: 3px black;
    }
    .perspective-1000 {
      perspective: 1000px;
    }
    .rotate-y-90 {
      transform: rotateY(90deg);
    }
    .rotate-y-0 {
      transform: rotateY(0deg);
    }
  </style>

  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
